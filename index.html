<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>OnchainDailyPosting</title>

<style>
body {
  margin:0;
  font-family:Arial, sans-serif;
  background:#0a0a0f;
  color:#fff;
}

.container {
  max-width:800px;
  margin:auto;
  padding:20px;
}

h1 {
  color:#f5e642;
}

.compose {
  background:#111118;
  padding:15px;
  border-radius:10px;
  margin-bottom:20px;
}

textarea {
  width:100%;
  height:80px;
  background:none;
  border:none;
  color:white;
  outline:none;
}

button {
  margin-top:10px;
  padding:10px 20px;
  background:#f5e642;
  border:none;
  border-radius:8px;
  font-weight:bold;
  cursor:pointer;
}

.post {
  background:#111118;
  padding:15px;
  border-radius:10px;
  margin-top:10px;
}

</style>
</head>

<body>

<div class="container">
  <h1>Onchain Daily Posting 🚀</h1>

  <div class="compose">
    <textarea id="postInput" placeholder="Tulis sesuatu..."></textarea>
    <button onclick="addPost()">Post</button>
  </div>

  <div id="feed"></div>
</div>

<script>
function addPost() {
  const input = document.getElementById("postInput");
  const text = input.value.trim();

  if (text === "") {
    alert("Isi dulu postingannya!");
    return;
  }

  const feed = document.getElementById("feed");

  const post = document.createElement("div");
  post.className = "post";
  post.innerText = text;

  feed.prepend(post);

  input.value = "";
}
</script>

</body>
</html>
