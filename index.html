<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>OnchainDailyPosting</title>

<style>
*{margin:0;padding:0;box-sizing:border-box}

body{
  font-family:Arial, sans-serif;
  background:#0a0a0f;
  color:white;
}

/* FIX BACKGROUND LAYER */
body::before{
  content:'';
  position:fixed;
  inset:0;
  background:rgba(255,255,255,0.02);
  pointer-events:none; /* FIX KLIK */
}

.wrapper{
  max-width:900px;
  margin:auto;
  padding:20px;
  position:relative;
  z-index:999; /* FIX KLIK */
}

/* HEADER */
h1{
  color:#f5e642;
  margin-bottom:20px;
}

/* COMPOSE */
.compose{
  background:#111118;
  border:1px solid #1e1e2e;
  border-radius:12px;
  padding:15px;
  margin-bottom:20px;
}

textarea{
  width:100%;
  background:none;
  border:none;
  color:white;
  outline:none;
  resize:none;
  height:80px;
}

button{
  margin-top:10px;
  padding:10px 18px;
  border:none;
  border-radius:8px;
  background:#f5e642;
  color:black;
  font-weight:bold;
  cursor:pointer;
}

/* POST */
.post{
  background:#111118;
  border:1px solid #1e1e2e;
  border-radius:12px;
  padding:15px;
  margin-bottom:12px;
  animation:fade .3s ease;
}

@keyframes fade{
  from{opacity:0;transform:translateY(10px)}
  to{opacity:1}
}

.post-footer{
  margin-top:10px;
  display:flex;
  gap:10px;
}

.reaction-btn{
  padding:6px 12px;
  border:1px solid #1e1e2e;
  background:none;
  color:#aaa;
  border-radius:8px;
  cursor:pointer;
}

.reaction-btn.active{
  color:#ff6b35;
  border-color:#ff6b35;
}

</style>
</head>

<body>

<div class="wrapper">
  <h1>Onchain Daily Posting 🚀</h1>

  <div class="compose">
    <textarea id="input" placeholder="Tulis sesuatu..."></textarea>
    <button id="postBtn">Post</button>
  </div>

  <div id="feed"></div>
</div>

<script>
// POST SYSTEM
document.getElementById("postBtn").addEventListener("click", () => {
  const input = document.getElementById("input");
  const text = input.value.trim();

  if(!text){
    alert("Isi dulu postingannya!");
    return;
  }

  createPost(text);
  input.value = "";
});

// CREATE POST
function createPost(text){
  const feed = document.getElementById("feed");

  const post = document.createElement("div");
  post.className = "post";

  post.innerHTML = `
    <div>${text}</div>
    <div class="post-footer">
      <button class="reaction-btn">❤️ Like</button>
      <button class="reaction-btn">🔥 Boost</button>
    </div>
  `;

  feed.prepend(post);

  // ACTIVE BUTTON
  post.querySelectorAll(".reaction-btn").forEach(btn=>{
    btn.addEventListener("click", ()=>{
      btn.classList.toggle("active");
    });
  });
}
</script>

</body>
</html>
