<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>OnchainDailyPosting — Community Hub</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0a0a0f;
      --card: #111118;
      --border: #1e1e2e;
      --yellow: #f5e642;
      --orange: #ff6b35;
      --pink: #ff3cac;
      --cyan: #3cf0e0;
      --green: #4dff91;
      --purple: #9b5de5;
      --white: #f0f0f8;
      --muted: #6b6b8a;
    }

    html { scroll-behavior: smooth; }

    body {
      background: var(--bg);
      color: var(--white);
      font-family: 'Syne', sans-serif;
      overflow-x: hidden;
      cursor: default;
    }

    /* NOISE OVERLAY */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
      pointer-events: none;
      z-index: 999;
      opacity: 0.5;
    }

    /* BACKGROUND BLOBS */
    .bg-blobs {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 0;
      overflow: hidden;
    }
    .blob {
      position: absolute;
      border-radius: 50%;
      filter: blur(120px);
      opacity: 0.12;
    }
    .blob-1 { width: 600px; height: 600px; background: var(--pink); top: -200px; left: -100px; animation: float1 12s ease-in-out infinite; }
    .blob-2 { width: 500px; height: 500px; background: var(--cyan); top: 30%; right: -150px; animation: float2 15s ease-in-out infinite; }
    .blob-3 { width: 400px; height: 400px; background: var(--yellow); bottom: -100px; left: 30%; animation: float3 10s ease-in-out infinite; }

    @keyframes float1 { 0%,100%{transform:translate(0,0)} 50%{transform:translate(40px,30px)} }
    @keyframes float2 { 0%,100%{transform:translate(0,0)} 50%{transform:translate(-30px,40px)} }
    @keyframes float3 { 0%,100%{transform:translate(0,0)} 50%{transform:translate(20px,-30px)} }

    /* LAYOUT */
    .wrapper { position: relative; z-index: 1; max-width: 1200px; margin: 0 auto; padding: 0 24px; }

    /* ── HEADER ── */
    header {
      padding: 20px 0;
      border-bottom: 1px solid var(--border);
      position: sticky;
      top: 0;
      z-index: 100;
      background: rgba(10,10,15,0.85);
      backdrop-filter: blur(16px);
    }
    .header-inner {
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .logo {
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .logo-icon {
      width: 40px; height: 40px;
      background: var(--yellow);
      border-radius: 10px;
      display: flex; align-items: center; justify-content: center;
      font-size: 20px;
      flex-shrink: 0;
    }
    .logo-text {
      font-size: 1.1rem;
      font-weight: 800;
      letter-spacing: -0.5px;
      line-height: 1.1;
    }
    .logo-text span { color: var(--yellow); }
    .logo-sub { font-size: 0.65rem; font-family: 'Space Mono', monospace; color: var(--muted); letter-spacing: 2px; text-transform: uppercase; }

    nav { display: flex; gap: 8px; }
    nav a {
      padding: 8px 16px;
      border-radius: 8px;
      font-size: 0.8rem;
      font-weight: 700;
      text-decoration: none;
      color: var(--muted);
      letter-spacing: 0.5px;
      transition: all 0.2s;
    }
    nav a:hover { color: var(--white); background: var(--border); }
    nav a.active { color: var(--bg); background: var(--yellow); }

    .header-cta {
      padding: 10px 20px;
      border-radius: 10px;
      background: var(--yellow);
      color: var(--bg);
      font-weight: 800;
      font-size: 0.82rem;
      border: none;
      cursor: pointer;
      letter-spacing: 0.5px;
      transition: transform 0.15s, box-shadow 0.15s;
    }
    .header-cta:hover { transform: translateY(-2px); box-shadow: 0 8px 24px rgba(245,230,66,0.3); }

    /* ── HERO ── */
    .hero {
      padding: 80px 0 60px;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 60px;
      align-items: center;
    }
    .hero-label {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 6px 14px;
      background: rgba(255,60,172,0.12);
      border: 1px solid rgba(255,60,172,0.3);
      border-radius: 20px;
      font-size: 0.72rem;
      font-family: 'Space Mono', monospace;
      color: var(--pink);
      letter-spacing: 1px;
      text-transform: uppercase;
      margin-bottom: 20px;
    }
    .pulse { width: 8px; height: 8px; background: var(--pink); border-radius: 50%; animation: pulse 1.5s ease-in-out infinite; }
    @keyframes pulse { 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:0.5;transform:scale(0.8)} }

    .hero h1 {
      font-size: clamp(2.5rem, 5vw, 4rem);
      font-weight: 800;
      line-height: 1.05;
      letter-spacing: -2px;
      margin-bottom: 20px;
    }
    .hero h1 .line-yellow { color: var(--yellow); display: block; }
    .hero h1 .line-stroke {
      -webkit-text-stroke: 2px var(--orange);
      color: transparent;
      display: block;
    }

    .hero-desc {
      font-size: 1rem;
      color: var(--muted);
      line-height: 1.7;
      margin-bottom: 32px;
      max-width: 420px;
    }

    .hero-actions { display: flex; gap: 12px; flex-wrap: wrap; }
    .btn-primary {
      padding: 14px 28px;
      background: linear-gradient(135deg, var(--orange), var(--pink));
      color: white;
      font-weight: 800;
      font-size: 0.9rem;
      border: none;
      border-radius: 12px;
      cursor: pointer;
      letter-spacing: 0.3px;
      transition: transform 0.15s, box-shadow 0.2s;
    }
    .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 10px 30px rgba(255,107,53,0.35); }
    .btn-ghost {
      padding: 14px 28px;
      background: transparent;
      color: var(--white);
      font-weight: 700;
      font-size: 0.9rem;
      border: 1px solid var(--border);
      border-radius: 12px;
      cursor: pointer;
      transition: border-color 0.2s, background 0.2s;
    }
    .btn-ghost:hover { border-color: var(--cyan); color: var(--cyan); background: rgba(60,240,224,0.05); }

    /* STATS STRIP */
    .stats-strip {
      display: flex;
      gap: 4px;
    }
    .stat-card {
      flex: 1;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 20px;
      text-align: center;
      position: relative;
      overflow: hidden;
      transition: transform 0.2s;
    }
    .stat-card:hover { transform: translateY(-4px); }
    .stat-card::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 2px;
    }
    .stat-card:nth-child(1)::before { background: var(--yellow); }
    .stat-card:nth-child(2)::before { background: var(--pink); }
    .stat-card:nth-child(3)::before { background: var(--cyan); }
    .stat-card:nth-child(4)::before { background: var(--green); }
    .stat-num {
      font-size: 1.8rem;
      font-weight: 800;
      letter-spacing: -1px;
      display: block;
      margin-bottom: 4px;
    }
    .stat-card:nth-child(1) .stat-num { color: var(--yellow); }
    .stat-card:nth-child(2) .stat-num { color: var(--pink); }
    .stat-card:nth-child(3) .stat-num { color: var(--cyan); }
    .stat-card:nth-child(4) .stat-num { color: var(--green); }
    .stat-label { font-size: 0.68rem; color: var(--muted); font-family: 'Space Mono', monospace; text-transform: uppercase; letter-spacing: 1px; }

    /* ── SECTION TITLE ── */
    .section-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 28px;
    }
    .section-title {
      font-size: 1.4rem;
      font-weight: 800;
      letter-spacing: -0.5px;
    }
    .section-tag {
      font-size: 0.7rem;
      font-family: 'Space Mono', monospace;
      color: var(--muted);
      background: var(--border);
      padding: 5px 12px;
      border-radius: 20px;
      letter-spacing: 1px;
    }

    /* ── MAIN GRID ── */
    .main-grid {
      display: grid;
      grid-template-columns: 1fr 340px;
      gap: 24px;
      padding: 40px 0 60px;
    }

    /* FEED */
    .feed { display: flex; flex-direction: column; gap: 16px; }

    .post-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 18px;
      padding: 22px;
      position: relative;
      overflow: hidden;
      transition: transform 0.2s, border-color 0.2s;
      animation: fadeUp 0.5s ease both;
    }
    .post-card:hover { transform: translateY(-3px); border-color: rgba(255,255,255,0.12); }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(20px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .post-card:nth-child(1) { animation-delay: 0.05s; }
    .post-card:nth-child(2) { animation-delay: 0.1s; }
    .post-card:nth-child(3) { animation-delay: 0.15s; }
    .post-card:nth-child(4) { animation-delay: 0.2s; }
    .post-card:nth-child(5) { animation-delay: 0.25s; }

    .post-accent {
      position: absolute;
      top: 0; left: 0;
      width: 3px;
      height: 100%;
      border-radius: 3px 0 0 3px;
    }

    .post-header {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 14px;
    }
    .avatar {
      width: 40px; height: 40px;
      border-radius: 12px;
      display: flex; align-items: center; justify-content: center;
      font-size: 1.1rem;
      font-weight: 800;
      flex-shrink: 0;
    }
    .post-meta { flex: 1; }
    .post-author { font-size: 0.9rem; font-weight: 700; margin-bottom: 2px; }
    .post-time { font-size: 0.68rem; font-family: 'Space Mono', monospace; color: var(--muted); }
    .post-badge {
      font-size: 0.62rem;
      font-family: 'Space Mono', monospace;
      padding: 4px 10px;
      border-radius: 10px;
      font-weight: 700;
      letter-spacing: 0.5px;
      text-transform: uppercase;
    }

    .post-content {
      font-size: 0.92rem;
      line-height: 1.65;
      color: #c8c8e0;
      margin-bottom: 16px;
    }
    .post-content .tag { color: var(--cyan); font-weight: 700; }
    .post-content .mention { color: var(--pink); font-weight: 700; }
    .post-content .highlight { color: var(--yellow); font-weight: 700; }

    .post-chain {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 5px 12px;
      background: rgba(255,255,255,0.04);
      border: 1px solid var(--border);
      border-radius: 8px;
      font-size: 0.68rem;
      font-family: 'Space Mono', monospace;
      color: var(--muted);
      margin-bottom: 14px;
    }
    .chain-dot { width: 6px; height: 6px; border-radius: 50%; }

    .post-footer {
      display: flex;
      align-items: center;
      gap: 6px;
      padding-top: 14px;
      border-top: 1px solid var(--border);
    }
    .reaction-btn {
      display: flex;
      align-items: center;
      gap: 5px;
      padding: 6px 12px;
      border: 1px solid var(--border);
      border-radius: 8px;
      background: transparent;
      color: var(--muted);
      font-size: 0.75rem;
      font-family: 'Syne', sans-serif;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.15s;
    }
    .reaction-btn:hover { border-color: var(--yellow); color: var(--yellow); background: rgba(245,230,66,0.06); }
    .reaction-btn.active { border-color: var(--orange); color: var(--orange); background: rgba(255,107,53,0.08); }
    .post-share {
      margin-left: auto;
      padding: 6px 12px;
      border: 1px solid var(--border);
      border-radius: 8px;
      background: transparent;
      color: var(--muted);
      font-size: 0.75rem;
      cursor: pointer;
      transition: all 0.15s;
    }
    .post-share:hover { color: var(--cyan); border-color: var(--cyan); }

    /* COMPOSE BAR */
    .compose-bar {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 18px;
      padding: 18px;
      display: flex;
      gap: 12px;
      align-items: flex-start;
      margin-bottom: 16px;
      transition: border-color 0.2s;
    }
    .compose-bar:focus-within { border-color: var(--yellow); }
    .compose-avatar {
      width: 38px; height: 38px;
      background: linear-gradient(135deg, var(--orange), var(--pink));
      border-radius: 10px;
      display: flex; align-items: center; justify-content: center;
      font-size: 1rem;
      flex-shrink: 0;
    }
    .compose-input {
      flex: 1;
      background: none;
      border: none;
      color: var(--white);
      font-family: 'Syne', sans-serif;
      font-size: 0.9rem;
      resize: none;
      outline: none;
      padding-top: 6px;
      min-height: 60px;
    }
    .compose-input::placeholder { color: var(--muted); }
    .compose-actions { display: flex; gap: 8px; align-items: center; margin-top: 10px; }
    .compose-tag-btn {
      padding: 6px 14px;
      border-radius: 8px;
      border: 1px solid var(--border);
      background: none;
      color: var(--muted);
      font-size: 0.78rem;
      cursor: pointer;
      font-family: 'Space Mono', monospace;
      transition: all 0.15s;
    }
    .compose-tag-btn:hover { color: var(--cyan); border-color: var(--cyan); }
    .compose-submit {
      margin-left: auto;
      padding: 8px 20px;
      background: var(--yellow);
      color: var(--bg);
      font-weight: 800;
      font-size: 0.8rem;
      border: none;
      border-radius: 10px;
      cursor: pointer;
      font-family: 'Syne', sans-serif;
      transition: transform 0.15s, box-shadow 0.15s;
    }
    .compose-submit:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(245,230,66,0.3); }

    /* ── SIDEBAR ── */
    .sidebar { display: flex; flex-direction: column; gap: 16px; }

    .side-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 18px;
      padding: 20px;
      animation: fadeUp 0.5s ease both;
    }
    .side-card:nth-child(1) { animation-delay: 0.15s; }
    .side-card:nth-child(2) { animation-delay: 0.2s; }
    .side-card:nth-child(3) { animation-delay: 0.25s; }
    .side-card-title {
      font-size: 0.78rem;
      font-family: 'Space Mono', monospace;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 1.5px;
      margin-bottom: 16px;
    }

    /* STREAK BOARD */
    .streak-list { display: flex; flex-direction: column; gap: 10px; }
    .streak-item {
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .streak-rank {
      width: 22px;
      font-size: 0.7rem;
      font-family: 'Space Mono', monospace;
      color: var(--muted);
      text-align: center;
      flex-shrink: 0;
    }
    .streak-rank.top { color: var(--yellow); font-weight: 700; }
    .streak-avatar {
      width: 34px; height: 34px;
      border-radius: 9px;
      display: flex; align-items: center; justify-content: center;
      font-size: 0.9rem;
      font-weight: 700;
      flex-shrink: 0;
    }
    .streak-info { flex: 1; }
    .streak-name { font-size: 0.82rem; font-weight: 700; }
    .streak-days { font-size: 0.65rem; font-family: 'Space Mono', monospace; color: var(--muted); }
    .streak-fire {
      font-size: 0.8rem;
      font-family: 'Space Mono', monospace;
      font-weight: 700;
    }

    /* TRENDING TOPICS */
    .topic-list { display: flex; flex-direction: column; gap: 8px; }
    .topic-item {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 10px 12px;
      border-radius: 10px;
      background: rgba(255,255,255,0.03);
      border: 1px solid var(--border);
      cursor: pointer;
      transition: all 0.15s;
    }
    .topic-item:hover { background: rgba(255,255,255,0.06); border-color: rgba(255,255,255,0.12); }
    .topic-name {
      font-size: 0.82rem;
      font-weight: 700;
    }
    .topic-count {
      font-size: 0.65rem;
      font-family: 'Space Mono', monospace;
      color: var(--muted);
    }

    /* CHAIN FILTER */
    .chain-filter { display: flex; flex-direction: column; gap: 8px; }
    .chain-item {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 10px 12px;
      border-radius: 10px;
      cursor: pointer;
      border: 1px solid transparent;
      transition: all 0.15s;
    }
    .chain-item:hover { background: rgba(255,255,255,0.04); border-color: var(--border); }
    .chain-item.active { background: rgba(245,230,66,0.07); border-color: rgba(245,230,66,0.3); }
    .chain-left { display: flex; align-items: center; gap: 10px; }
    .chain-logo { width: 28px; height: 28px; border-radius: 8px; display: flex; align-items: center; justify-content: center; font-size: 0.85rem; }
    .chain-name { font-size: 0.82rem; font-weight: 700; }
    .chain-posts { font-size: 0.65rem; font-family: 'Space Mono', monospace; color: var(--muted); }

    /* TICKER */
    .ticker-wrap {
      overflow: hidden;
      border-top: 1px solid var(--border);
      border-bottom: 1px solid var(--border);
      padding: 10px 0;
      margin-top: 0;
      position: relative;
    }
    .ticker-wrap::before,
    .ticker-wrap::after {
      content: '';
      position: absolute;
      top: 0; bottom: 0;
      width: 80px;
      z-index: 2;
      pointer-events: none;
    }
    .ticker-wrap::before { left: 0; background: linear-gradient(to right, var(--bg), transparent); }
    .ticker-wrap::after  { right: 0; background: linear-gradient(to left, var(--bg), transparent); }
    .ticker-track {
      display: flex;
      width: max-content;
      animation: ticker 35s linear infinite;
    }
    .ticker-track:hover { animation-play-state: paused; }
    .ticker-set {
      display: flex;
      gap: 0;
    }
    @keyframes ticker {
      0%   { transform: translateX(0); }
      100% { transform: translateX(-50%); }
    }
    .ticker-item {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      font-size: 0.72rem;
      font-family: 'Space Mono', monospace;
      color: var(--muted);
      padding: 0 28px;
      border-right: 1px solid var(--border);
    }
    .ticker-item .up { color: var(--green); }
    .ticker-item .down { color: var(--pink); }
    .ticker-sym { color: var(--white); font-weight: 700; }
    .ticker-sep { color: var(--border); padding: 0 4px; }

    /* FOOTER */
    footer {
      border-top: 1px solid var(--border);
      padding: 32px 0;
      margin-top: 20px;
    }
    .footer-inner {
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .footer-copy {
      font-size: 0.72rem;
      font-family: 'Space Mono', monospace;
      color: var(--muted);
    }
    .footer-links { display: flex; gap: 20px; }
    .footer-links a {
      font-size: 0.72rem;
      font-family: 'Space Mono', monospace;
      color: var(--muted);
      text-decoration: none;
      transition: color 0.15s;
    }
    .footer-links a:hover { color: var(--cyan); }

    /* FILTER TABS */
    .filter-tabs {
      display: flex;
      gap: 6px;
      margin-bottom: 20px;
    }
    .filter-tab {
      padding: 8px 18px;
      border-radius: 10px;
      border: 1px solid var(--border);
      background: none;
      color: var(--muted);
      font-size: 0.78rem;
      font-weight: 700;
      font-family: 'Syne', sans-serif;
      cursor: pointer;
      transition: all 0.15s;
      letter-spacing: 0.3px;
    }
    .filter-tab:hover { color: var(--white); border-color: rgba(255,255,255,0.2); }
    .filter-tab.active { background: var(--yellow
