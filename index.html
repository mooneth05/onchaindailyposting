<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Onchain Daily Posting</title>

<style>
*{margin:0;padding:0;box-sizing:border-box}

body{
  font-family:Arial, sans-serif;
  background:#0a0a0f;
  color:white;
  overflow-x:hidden;
}

/* BACKGROUND EFFECT */
.bg{
  position:fixed;
  inset:0;
  background:radial-gradient(circle at 20% 30%, #ff3cac22, transparent),
             radial-gradient(circle at 80% 70%, #3cf0e022, transparent);
  z-index:0;
  pointer-events:none;
}

/* CONTAINER */
.wrapper{
  max-width:900px;
  margin:auto;
  padding:20px;
  position:relative;
  z-index:2;
}

/* HEADER */
h1{
  color:#f5e642;
  margin-bottom:20px;
  font-size:28px;
}

/* COMPOSE */
.compose{
  background:#111118;
  border:1px solid #1e1e2e;
  border-radius:14px;
  padding:15px;
  margin-bottom:20px;
  transition:0.2s;
}

.compose:focus-within{
  border-color:#f5e642;
  box-shadow:0 0 15px #f5e64222;
}

textarea{
  width:100%;
  height:80px;
  background:none;
  border:none;
  color:white;
  outline:none;
  resize:none;
}

/* BUTTON */
button{
  margin-top:10px;
  padding:10px 18px;
  border:none;
  border-radius:10px;
  background:linear-gradient(135deg,#ff6b35,#ff3cac);
  color:white;
  font-weight:bold;
  cursor:pointer;
  transition:0.2s;
}

button:hover{
  transform:translateY(-2px);
  box-shadow:0 5px 20px #ff3cac55;
}

/* POST */
.post{
  background:#111118;
  border:1px solid #1e1e2e;
  border-radius:14px;
  padding:15px;
  margin-bottom:12px;
  animation:fade 0.4s ease;
  transition:0.2s;
}

.post:hover{
  transform:translateY(-3px);
  border-color:#ffffff22;
}

@keyframes fade{
  from{opacity:0;transform:translateY(15px)}
  to{opacity:1}
}

/* FOOTER */
.post-footer{
  margin-top:12px;
  display:flex;
  gap:8px;
}

.reaction-btn{
  padding:6px 12px;
  border:1px solid #1e1e2e;
  background:none;
  color:#aaa;
  border-radius:8px;
  cursor:pointer;
  transition:0.2s;
}

.reaction-btn:hover{
  color:#fff;
  border-color:#fff;
}

.reaction-btn.active{
  color:#ff6b35;
  border-color:#ff6b35;
}

/* FLOAT ANIMATION */
@keyframes float{
  0%,100%{transform:translateY(0)}
  50%{transform:translateY(-3px)}
}
</style>
</head>

<body>

<div class="bg"></div>

<div class="wrapper">
  <h1>🚀 Onchain Daily Posting</h1>

  <div class="compose">
    <textarea id="input" placeholder="Apa yang kamu pikirkan hari ini?"></textarea>
    <button id="postBtn">Post</button>
  </div>

  <div id="feed"></div>
</div>

<script>
// AUTO SAVE LOCAL
let posts = JSON.parse(localStorage.getItem("posts") || "[]");

// LOAD POST
posts.forEach(p => createPost(p));

// POST BUTTON
document.getElementById("postBtn").onclick = () => {
  const input = document.getElementById("input");
  const text = input.value.trim();

  if(!text){
    alert("Isi dulu postingannya!");
    return;
  }

  posts.unshift(text);
  localStorage.setItem("posts", JSON.stringify(posts));

  createPost(text);
  input.value="";
};

// CREATE POST
function createPost(text){
  const feed = document.getElementById("feed");

  const el = document.createElement("div");
  el.className="post";

  el.innerHTML = `
    <div>${text}</div>
    <div class="post-footer">
      <button class="reaction-btn">❤️</button>
      <button class="reaction-btn">🔥</button>
      <button class="reaction-btn">💬</button>
    </div>
  `;

  feed.prepend(el);

  el.querySelectorAll(".reaction-btn").forEach(btn=>{
    btn.onclick=()=>{
      btn.classList.toggle("active");
      btn.style.animation="float 0.3s";
      setTimeout(()=>btn.style.animation="",300);
    };
  });
}
</script>

</body>
</html>
